<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biologia · Ryby, Płazy, Gady · Варвара</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0faf4;
  --card:#ffffff;
  --border:#c8e6d0;
  --ink:#0d2b1a;
  --muted:#5a7a67;
  --teal:#0d9488;--teal-bg:#f0fdfa;--teal-b:#99f6e4;
  --blue:#1d6fa4;--blue-bg:#eff8ff;--blue-b:#93c5fd;
  --amber:#b45309;--amber-bg:#fffbeb;--amber-b:#fcd34d;
  --red:#b91c1c;--red-bg:#fff1f2;--red-b:#fca5a5;
  --green:#15803d;--green-bg:#f0fdf4;--green-b:#86efac;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-b:#c4b5fd;
  --r:16px;--rs:10px;
  --sh:0 4px 20px rgba(13,43,26,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;
  background-image:
    radial-gradient(ellipse at 5% 10%,#bbf7d0 0%,transparent 45%),
    radial-gradient(ellipse at 95% 90%,#bae6fd 0%,transparent 45%);
}
.page{max-width:700px;margin:0 auto;padding:24px 16px 80px}

/* HERO */
.hero{text-align:center;padding:28px 0 24px;margin-bottom:24px}
.hero .badge{display:inline-flex;align-items:center;gap:6px;background:var(--teal);color:#fff;
  font-family:'Outfit',sans-serif;font-weight:700;font-size:11px;letter-spacing:.1em;
  text-transform:uppercase;padding:5px 16px;border-radius:99px;margin-bottom:14px}
.hero h1{font-family:'Outfit',sans-serif;font-size:30px;font-weight:900;line-height:1.15;margin-bottom:6px}
.hero h1 span{color:var(--teal)}
.hero p{font-size:14px;color:var(--muted)}

/* GROUP TABS */
.group-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.gtab{
  padding:14px 10px;border:2px solid var(--border);border-radius:var(--r);
  background:white;cursor:pointer;text-align:center;transition:all .18s;
  font-family:'Outfit',sans-serif;box-shadow:var(--sh);
}
.gtab:hover{transform:translateY(-2px)}
.gtab .g-ico{font-size:26px;margin-bottom:6px}
.gtab .g-name{font-size:13px;font-weight:800;color:var(--ink);line-height:1.3}
.gtab .g-sub{font-size:11px;color:var(--muted);margin-top:2px}
.gtab.fish.active{border-color:var(--blue);background:var(--blue-bg)}
.gtab.amphibian.active{border-color:var(--teal);background:var(--teal-bg)}
.gtab.reptile.active{border-color:var(--amber);background:var(--amber-bg)}

/* INNER TABS */
.itabs{display:flex;gap:5px;background:white;padding:5px;border-radius:var(--r);
  border:1px solid var(--border);margin-bottom:18px}
.itab{flex:1;padding:8px 4px;border-radius:var(--rs);border:none;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;background:transparent;color:var(--muted);transition:all .18s;text-align:center}
.itab:hover{background:var(--bg);color:var(--ink)}
.itab.active.fish{background:var(--blue);color:white}
.itab.active.amphibian{background:var(--teal);color:white}
.itab.active.reptile{background:var(--amber);color:white}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:20px;margin-bottom:14px;box-shadow:var(--sh);animation:up .22s ease}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-h{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;margin-bottom:14px;
  display:flex;align-items:center;gap:8px}

/* FACTS GRID */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.fb{padding:12px 14px;border-radius:var(--rs);border:1.5px solid}
.fb.teal{background:var(--teal-bg);border-color:var(--teal-b)}
.fb.blue{background:var(--blue-bg);border-color:var(--blue-b)}
.fb.amber{background:var(--amber-bg);border-color:var(--amber-b)}
.fb.red{background:var(--red-bg);border-color:var(--red-b)}
.fb.green{background:var(--green-bg);border-color:var(--green-b)}
.fb.purple{background:var(--purple-bg);border-color:var(--purple-b)}
.fb h3{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px}
.fb.teal h3{color:var(--teal)}.fb.blue h3{color:var(--blue)}.fb.amber h3{color:var(--amber)}
.fb.red h3{color:var(--red)}.fb.green h3{color:var(--green)}.fb.purple h3{color:var(--purple)}
.fb ul{list-style:none;font-size:13px;line-height:1.9}
.fb.teal ul{color:#134e4a}.fb.blue ul{color:#1e3a8a}.fb.amber ul{color:#78350f}
.fb.red ul{color:#7f1d1d}.fb.green ul{color:#14532d}.fb.purple ul{color:#4c1d95}
.fb ul li::before{content:"→ ";opacity:.45}

/* COMPARE TABLE */
.ctable{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px}
.ctable th{background:var(--ink);color:white;padding:9px 12px;font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;text-align:left}
.ctable th:first-child{border-radius:var(--rs) 0 0 0}
.ctable th:last-child{border-radius:0 var(--rs) 0 0}
.ctable td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5}
.ctable tr:nth-child(even) td{background:#f8fffe}
.ctable tr:last-child td{border-bottom:none}
.ctable .label{font-weight:600;color:var(--ink)}
.ctable .fish-c{color:var(--blue)}.ctable .amp-c{color:var(--teal)}.ctable .rep-c{color:var(--amber)}

/* BODY PARTS */
.body-grid{display:flex;flex-direction:column;gap:7px}
.body-item{display:flex;gap:12px;align-items:flex-start;
  background:var(--bg);border-radius:var(--rs);padding:10px 14px;border:1px solid var(--border)}
.body-ico{font-size:20px;flex-shrink:0}
.body-name{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;margin-bottom:2px}
.body-desc{font-size:13px;line-height:1.5;color:var(--ink)}
.body-pl{font-size:12px;color:var(--muted);font-style:italic}

/* EXAMPLES */
.ex-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.ex-card{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs);padding:12px 14px;text-align:center}
.ex-ico{font-size:28px;margin-bottom:4px}
.ex-name{font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;color:var(--ink)}
.ex-pl{font-size:12px;color:var(--muted)}
.ex-fact{font-size:12px;color:var(--ink);margin-top:4px;line-height:1.5}

/* SIGNIFICANCE */
.sig-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.sig-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.sig-text{font-size:14px;line-height:1.6}
.sig-text strong{color:var(--green)}

/* FLASHCARDS */
.fc-wrap{margin-bottom:14px}
.fc-meta{text-align:center;font-size:13px;color:var(--muted);margin-bottom:12px}
.flashcard{perspective:1000px;width:100%;min-height:175px;cursor:pointer;margin-bottom:10px}
.fc-inner{position:relative;width:100%;min-height:175px;transform-style:preserve-3d;transition:transform .48s;border-radius:var(--r)}
.flashcard.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{
  position:absolute;width:100%;min-height:175px;backface-visibility:hidden;
  border-radius:var(--r);padding:22px 20px;display:flex;flex-direction:column;
  justify-content:center;border:2px solid var(--border);box-shadow:var(--sh);
}
.fc-front{background:white;text-align:center}
.fc-back{transform:rotateY(180deg)}
.fc-back.fish{background:var(--blue-bg);border-color:var(--blue-b)}
.fc-back.amphibian{background:var(--teal-bg);border-color:var(--teal-b)}
.fc-back.reptile{background:var(--amber-bg);border-color:var(--amber-b)}
.fc-q{font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;line-height:1.4;margin-bottom:8px}
.fc-tap{font-size:12px;color:var(--muted)}
.fc-a{font-size:14px;line-height:1.75}
.fc-a strong{color:var(--teal)}
.fc-nav{display:flex;justify-content:space-between;align-items:center}
.fc-count{font-size:13px;color:var(--muted);font-weight:600}

/* QUIZ */
.prog-bar{height:6px;background:var(--border);border-radius:99px;margin-bottom:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .4s}
.fish-prog{background:linear-gradient(90deg,var(--blue),#60a5fa)}
.amphibian-prog{background:linear-gradient(90deg,var(--teal),#2dd4bf)}
.reptile-prog{background:linear-gradient(90deg,var(--amber),#fcd34d)}
.score-row{display:flex;gap:14px;font-size:13px;color:var(--muted);margin-bottom:14px}
.score-row b{color:var(--ink)}
.q-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-weight:600}
.q-text{font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;line-height:1.5;margin-bottom:8px}
.q-hint{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:12px}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{padding:11px 16px;border:1.5px solid var(--border);border-radius:var(--rs);
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;background:white;color:var(--ink);text-align:left;transition:all .15s}
.opt:hover:not(:disabled){border-color:var(--teal);background:var(--teal-bg)}
.opt.ok{background:var(--green-bg);border-color:var(--green-b);color:#14532d}
.opt.no{background:var(--red-bg);border-color:var(--red-b);color:#7f1d1d}
.feedback{margin-top:12px;padding:12px 16px;border-radius:var(--rs);font-size:14px;line-height:1.7;animation:up .2s ease}
.feedback.ok{background:var(--green-bg);color:#14532d;border:1px solid var(--green-b)}
.feedback.no{background:var(--red-bg);color:#7f1d1d;border:1px solid var(--red-b)}
.expl-box{margin-top:8px;background:white;border-radius:8px;padding:10px 13px;
  font-size:13px;line-height:1.7;border:1px solid var(--border)}
.nav-row{display:flex;justify-content:flex-end;margin-top:12px}
.btn{padding:10px 22px;border-radius:var(--rs);border:none;
  font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-fish{background:var(--blue);color:white}
.btn-fish:hover{background:#1553a0}
.btn-amp{background:var(--teal);color:white}
.btn-amp:hover{background:#0f766e}
.btn-rep{background:var(--amber);color:white}
.btn-rep:hover{background:#92400e}
.btn-sec{background:white;color:var(--ink);border:1.5px solid var(--border)}
.btn-sec:hover{background:var(--bg)}

/* RESULT */
.result{text-align:center;padding:10px 0 20px}
.result .big{font-family:'Outfit',sans-serif;font-size:58px;font-weight:900;color:var(--teal);line-height:1}
.result .msg{font-size:16px;color:var(--muted);margin:10px 0 20px}
.result-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.mk{background:#fffbeb;border:1.5px solid var(--amber-b);border-radius:var(--rs);padding:13px;margin-bottom:9px;text-align:left}
.mk-q{font-weight:700;font-size:14px;margin-bottom:4px}
.mk-w{font-size:13px;color:var(--red);margin-bottom:4px}
.mk-c{display:inline-block;background:var(--green-bg);color:#14532d;font-size:13px;font-weight:700;padding:3px 10px;border-radius:6px;margin-bottom:7px}
.mk-r{font-size:13px;color:var(--blue);background:var(--blue-bg);padding:8px 12px;border-radius:8px;line-height:1.7}

/* COMPARE TAB */
.compare-note{font-size:13px;color:var(--muted);margin-bottom:12px;font-style:italic}

@media(max-width:500px){
  .fg{grid-template-columns:1fr}.group-tabs{grid-template-columns:1fr}
  .ex-grid{grid-template-columns:1fr}.hero h1{font-size:24px}
  .result .big{font-size:42px}
}
</style>
</head>
<body>
<div class="page">

<div class="hero">
  <div class="badge">🔬 Biologia · 6 клас</div>
  <h1>Kręgowce —<br><span>Ryby · Płazy · Gady</span></h1>
  <p>Теорія · Будова · Приклади · Фішки · Тест · Варвара</p>
</div>

<div class="group-tabs" id="group-tabs"></div>
<div class="itabs" id="itabs"></div>
<div id="content"></div>

</div>
<script>
// ══════════════════════════════════════════════════ DATA

const GROUPS = [
  {
    id:'fish', cls:'fish', ico:'🐟', name:'Ryby', sub:'Кісткові та хрящові',
    color:'blue', btnCls:'btn-fish',
    summary:'Ryby to kręgowce żyjące wyłącznie w wodzie. Mają łuski, skrzela i płetwy. Są zmiennocieplne — temperatura ich ciała zależy od otoczenia.',
    facts:[
      {t:'blue',h:'Cechy ogólne',i:['Żyją tylko w wodzie','Oddychają skrzelami','Mają łuski i płetwy','Zmiennocieplne (zimnokrwiste)','Serce dwukomorowe']},

      {t:'red',h:'Podział',i:['Ryby kostne — 95% gatunków','Ryby chrzęstne — rekiny, płaszczki','Ryby dwudyszne — wyjątek','Morskie vs słodkowodne','Ok. 33 000 gatunków na świecie']},
    ],
    body:[
      {ico:'👁️',name:'Linia boczna',pl:'linia naboczna',desc:'Narząd czucia — wyczuwa drgania i prądy wody. Unikalny dla ryb i płazów.'},
      {ico:'🫁',name:'Skrzela',pl:'skrzela',desc:'Narząd oddechowy — wyciągają tlen rozpuszczony w wodzie. Zamiast płuc.'},
      {ico:'💨',name:'Pęcherz pławny',pl:'pęcherz pławny',desc:'Narząd hydrostatyczny — reguluje głębokość pływania bez wysiłku.'},
      {ico:'🐠',name:'Łuski',pl:'łuski',desc:'Ochrona ciała. Rosną przez całe życie — po łuskach można określić wiek ryby!'},
      {ico:'🏊',name:'Płetwy',pl:'płetwy',desc:'Zamiast kończyn. Grzbietowa (stabilność), ogonowa (napęd), piersiowe i brzuszne (sterowność).'},
      {ico:'❤️',name:'Serce dwukomorowe',pl:'serce',desc:'Jedna komora + jeden przedsionek. Krew okrąża ciało raz (1 obieg).'},
    ],
    examples:[
      {ico:'🐟',name:'Karp',pl:'karp (Cyprinus carpio)',fact:'Ryba hodowlana, do 30 kg. Symbol wigilii w Polsce.'},
      {ico:'🐡',name:'Okoń',pl:'okoń (Perca fluviatilis)',fact:'Drapieżna ryba słodkowodna z charakterystycznymi paskami.'},
      {ico:'🦈',name:'Rekin',pl:'rekin',fact:'Ryba chrzęstna, drapieżnik oceanów. Szkielet z chrząstki.'},
      {ico:'🐠',name:'Śledź',pl:'śledź (Clupea harengus)',fact:'Ryba morska, bardzo ważna gospodarczo dla Polski.'},
      {ico:'🐟',name:'Łosoś',pl:'łosoś (Salmo salar)',fact:'Wędrowna — żyje w morzu, ale tarło odbywa w rzekach.'},
      {ico:'🦑',name:'Płaszczka',pl:'płaszczka (Raja)',fact:'Ryba chrzęstna, spłaszczone ciało, żyje na dnie.'},
    ],
    significance:[
      {ico:'🍽️',text:'<strong>Pokarm</strong> — jeden z głównych źródeł białka dla ludzi na świecie (rybołówstwo, akwakultura)'},
      {ico:'🏭',text:'<strong>Gospodarka</strong> — rybołówstwo morskie i słodkowodne, hodowle ryb (karpia, łososia, pstrąga)'},

    flashcards:[
      {q:'Jak oddychają ryby?',a:'Ryby oddychają <strong>skrzelami</strong> — wyciągają tlen rozpuszczony w wodzie. Woda przepływa przez jamę skrzelową, a tlen przechodzi do krwi.'},
      {q:'Co to jest linia boczna u ryb?',a:'<strong>Linia boczna (naboczna)</strong> — narząd czucia wzdłuż boków ciała. Wyczuwa drgania i ruchy wody. Ryby używają jej jak "szóstego zmysłu."'},

      {q:'Co to jest linia boczna?',opts:['Wzór na łuskach','Narząd czucia drgań w wodzie','Linia tłuszczu pod skórą','Szlak migracyjny ryb'],a:1,hint:'Wzdłuż boków ciała — wyczuwa...',expl:'<strong>Linia boczna (naboczna)</strong> — narząd zmysłu wyczuwający drgania i prądy wody. Unikalny dla ryb i płazów.'},
      {q:'Jakie serce mają ryby?',opts:['Czterokomorowe','Trójkomorowe','Dwukomorowe','Jednokomorowe'],a:2,hint:'Mniej komór niż u ssaków',expl:'Ryby mają serce <strong>dwukomorowe</strong> (1 przedsionek + 1 komora). Krew krąży jednym obiegiem.'},
      {q:'Czym różni się rekin od karpia?',opts:['Rekin żyje w słodkiej wodzie','Rekin ma szkielet z chrząstki, karp kostny','Karp jest większy','Rekin ma płetwy, karp nie'],a:1,hint:'Kostny vs chrzęstny',expl:'Rekin to <strong>ryba chrzęstna</strong> — szkielet z chrząstki. Karp to <strong>ryba kostna</strong> — szkielet kostny. To główny podział ryb.'},
      {q:'Co to jest ikra?',opts:['Narząd ryby','Jajeczka ryby','Rodzaj łuski','Pokarm ryb'],a:1,hint:'Rozmnażanie ryb',expl:'<strong>Ikra</strong> to jajeczka (jaja) ryb składane w wodzie. Z ikry wylęgają się larwy — narybek. Zapłodnienie u większości ryb jest zewnętrzne.'},
    ],
  },

  {
    id:'amphibian', cls:'amphibian', ico:'🐸', name:'Płazy', sub:'Wodno-lądowe',
    color:'teal', btnCls:'btn-amp',

let cg = GROUPS[0];
let ct = 'theory';
let fcI=0,fcF=false;
let qi=0,sel=null,score=0,mistakes=[],qList=[];

const ITABS=[
  {id:'theory',l:'📖 Teoria'},
  {id:'body',l:'🔬 Budowa'},
  {id:'examples',l:'🐾 Przykłady'},
  {id:'significance',l:'🌍 Znaczenie'},
  {id:'flash',l:'🃏 Fiszki'},
  {id:'quiz',l:'✏️ Test'},
];

function setGroup(id){
  cg=GROUPS.find(g=>g.id===id);
  ct='theory';fcI=0;fcF=false;
  qi=0;sel=null;score=0;mistakes=[];
  qList=[...cg.quiz].sort(()=>Math.random()-.5);
  renderGroups();renderITabs();render();
}
function setTab(id){
  ct=id;fcI=0;fcF=false;
  if(id==='quiz'){qi=0;sel=null;score=0;mistakes=[];qList=[...cg.quiz].sort(()=>Math.random()-.5);}
  renderITabs();render();
}

function renderGroups(){
  document.getElementById('group-tabs').innerHTML=GROUPS.map(g=>`
    <button class="gtab ${g.cls}${g.id===cg.id?' active':''}" onclick="setGroup('${g.id}')">
      <div class="g-ico">${g.ico}</div>
      <div class="g-name">${g.name}</div>
      <div class="g-sub">${g.sub}</div>
    </button>`).join('');
}
function renderITabs(){
  document.getElementById('itabs').innerHTML=ITABS.map(t=>`
    <button class="itab${ct===t.id?' active '+cg.cls:''}" onclick="setTab('${t.id}')">${t.l}</button>`).join('');
}

function renderTheory(){

    <div class="card-h">${g.ico} ${g.name} — podstawowe cechy</div>
    <p style="font-size:14px;color:var(--muted);margin-bottom:14px;line-height:1.6">${g.summary}</p>
    <div class="fg">${g.facts.map(f=>`
      <div class="fb ${f.t}"><h3>${f.h}</h3>
      <ul>${f.i.map(i=>`<li>${i}</li>`).join('')}</ul></div>`).join('')}
    </div>
  </div>
  <div style="margin-top:4px">
    <button class="btn ${g.btnCls}" onclick="setTab('body')">🔬 Budowa →</button>
  </div>`;
}

}

  return `<div class="card">
    <div class="card-h">🐾 Przykłady — ${g.name}</div>
    <div class="ex-grid">${g.examples.map(e=>`
      <div class="ex-card">
        <div class="ex-ico">${e.ico}</div>
        <div class="ex-name">${e.name}</div>
        <div class="ex-pl">${e.pl}</div>
        <div class="ex-fact">${e.fact}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderSignificance(){
  const g=cg;
  return `<div class="card">
    <div class="card-h">🌍 Znaczenie — ${g.name}</div>
    <div>${g.significance.map(s=>`
      <div class="sig-item">
        <div class="sig-ico">${s.ico}</div>
        <div class="sig-text">${s.text}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderFlash(){
  const cards=cg.flashcards;
  const c=cards[fcI];
  return `<div class="card">
    <div class="card-h">🃏 Fiszki — ${cg.name}</div>
    <div class="fc-meta">Kliknij kartę · ${fcI+1} z ${cards.length}</div>
    <div class="flashcard${fcF?' flipped':''}" onclick="flipCard()">
      <div class="fc-inner">
        <div class="fc-front"><div class="fc-q">${c.q}</div><div class="fc-tap">👆 Kliknij — odpowiedź</div></div>
        <div class="fc-back ${cg.cls}"><div class="fc-a">${c.a}</div></div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="btn btn-sec" onclick="fcNav(-1)" ${fcI===0?'disabled':''}>← Poprzednia</button>
      <span class="fc-count">${fcI+1} / ${cards.length}</span>
      <button class="btn ${cg.btnCls}" onclick="fcNav(1)" ${fcI===cards.length-1?'disabled':''}>Następna →</button>
    </div>
  </div>`;
}

function flipCard(){fcF=!fcF;render();}
function fcNav(d){fcI+=d;fcF=false;render();}

function renderQuiz(){
  if(qi>=qList.length)return renderResult();
  const q=qList[qi];
  const total=qList.length;
  const pct=Math.round((qi/total)*100);
  const optsHTML=q.opts.map((o,i)=>{
    let cls='opt';
    if(sel!==null){if(i===q.a)cls+=' ok';else if(i===sel&&sel!==q.a)cls+=' no';}
    return `<button class="${cls}" onclick="choose(${i})" ${sel!==null?'disabled':''}>${o}</button>`;
  }).join('');
  let fb='';
  if(sel!==null){
    fb=sel===q.a
      ?`<div class="feedback ok">✓ Правильно! <div class="expl-box">${q.expl}</div></div>`
      :`<div class="feedback no">✗ Правильna: <strong>${q.opts[q.a]}</strong><div class="expl-box">${q.expl}</div></div>`;
  }
  return `
  <div class="prog-bar"><div class="prog-fill ${cg.cls}-prog" style="width:${pct}%"></div></div>
  <div class="score-row">
    <span>Pytanie <b>${qi+1}/${total}</b></span>
    <span>✅ <b style="color:var(--green)">${score}</b></span>
    <span>❌ <b style="color:var(--red)">${mistakes.length}</b></span>
  </div>
  <div class="card">
    <div class="q-label">Pytanie ${qi+1}</div>
    <div class="q-text">${q.q}</div>
    <div class="q-hint">💡 ${q.hint}</div>
    <div class="opts">${optsHTML}</div>
    ${fb}
  </div>
  <div class="nav-row">${sel!==null?`<button class="btn ${cg.btnCls}" onclick="nextQ()">Dalej →</button>`:''}</div>`;
}

function renderResult(){
  const total=qList.length;
  const pct=Math.round((score/total)*100);
  const emoji=pct>=80?'🎉':pct>=60?'👍':'📚';
  const stars=pct>=100?'⭐⭐⭐':pct>=80?'⭐⭐':pct>=60?'⭐':'';
  const msg=pct>=80?'Warwara — świetna robota!':pct>=60?'Dobrze! Powtórz błędy.':'Wróć do teorii i spróbuj ponownie.';
  const mHTML=mistakes.length?`
    <div style="margin-top:18px;text-align:left">
      <div style="font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;margin-bottom:12px">Błędy do powtórzenia:</div>
      ${mistakes.map(m=>`
        <div class="mk">
          <div class="mk-q">${m.q}</div>
          <div class="mk-w">Ти відповіла: <b>${m.wrong}</b></div>
          <div class="mk-c">✓ ${m.correct}</div>
          <div class="mk-r">${m.rule}</div>
        </div>`).join('')}
    </div>`:'';
  return `<div class="card"><div class="result">
    <div style="font-size:44px">${emoji}</div>
    <div style="font-size:26px;margin:6px 0">${stars}</div>
    <div class="big">${score}/${total}</div>
    <div class="msg">${msg}</div>
    <div class="result-btns">
      <button class="btn btn-sec" onclick="setTab('theory')">📖 Teoria</button>
      <button class="btn btn-sec" onclick="setTab('flash')">🃏 Fiszki</button>
      <button class="btn ${cg.btnCls}" onclick="setTab('quiz')">Ponownie ↺</button>
    </div>
    ${mHTML}
  </div></div>`;
}

function choose(i){
  if(sel!==null)return;
  sel=i;
  const q=qList[qi];
  if(i===q.a)score++;
  else mistakes.push({q:q.q,wrong:q.opts[i],correct:q.opts[q.a],rule:q.expl});
  render();
}
function nextQ(){qi++;sel=null;render();}

function render(){
  const c=document.getElementById('content');
  if(ct==='theory')c.innerHTML=renderTheory();
  else if(ct==='body')c.innerHTML=renderBody();
  else if(ct==='examples')c.innerHTML=renderExamples();
  else if(ct==='significance')c.innerHTML=renderSignificance();
  else if(ct==='flash')c.innerHTML=renderFlash();
  else c.innerHTML=renderQuiz();
}

setGroup('fish');
</script>
</body>
</html>
