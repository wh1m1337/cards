<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historia · Річна контрольна · Варвара</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1208;
  --parch:#fdf6e3;
  --parch2:#f5ead0;
  --border:#d4b896;
  --muted:#8a7560;
  --gold:#b8860b;
  --gold-light:#fef3c7;
  --gold-bright:#f59e0b;
  --red:#9b1c1c;
  --red-bg:#fef2f2;
  --blue:#1e3a8a;
  --blue-bg:#eff6ff;
  --green:#166534;
  --green-bg:#f0fdf4;
  --teal:#0f766e;
  --teal-bg:#f0fdfa;
  --r:14px;--rs:9px;
  --shadow:0 4px 24px rgba(26,18,8,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:var(--parch);color:var(--ink);min-height:100vh;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8a96e' fill-opacity='0.07'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.page{max-width:700px;margin:0 auto;padding:24px 16px 80px}

/* HERO */
.hero{text-align:center;padding:32px 0 28px;border-bottom:2px solid var(--border);margin-bottom:28px}
.hero .ornament{font-size:28px;letter-spacing:12px;color:var(--gold);margin-bottom:10px}
.hero h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:var(--ink);line-height:1.15;margin-bottom:8px}
.hero h1 em{color:var(--gold);font-style:normal}
.hero p{font-size:14px;color:var(--muted)}
.hero .badge{display:inline-block;background:var(--gold);color:white;font-size:11px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;padding:4px 14px;border-radius:99px;margin-bottom:16px}

/* TOPIC SELECTOR */
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.topic-btn{
  padding:14px 12px;border:2px solid var(--border);border-radius:var(--r);
  background:white;cursor:pointer;text-align:left;transition:all .18s;
  font-family:'Source Sans 3',sans-serif;box-shadow:var(--shadow);
}
.topic-btn:hover{border-color:var(--gold-bright);background:var(--gold-light);transform:translateY(-2px)}
.topic-btn.active{border-color:var(--gold);background:var(--gold-light);box-shadow:0 0 0 3px rgba(184,134,11,.15)}
.topic-btn .t-num{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.topic-btn .t-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink);line-height:1.3}
.topic-btn .t-era{font-size:12px;color:var(--muted);margin-top:3px}
.topic-btn.active .t-num,.topic-btn.active .t-era{color:var(--gold)}

/* INNER TABS */
.inner-tabs{display:flex;gap:6px;margin-bottom:18px;background:white;padding:5px;border-radius:var(--r);border:1px solid var(--border)}
.itab{flex:1;padding:8px 6px;border-radius:var(--rs);border:none;font-family:'Source Sans 3',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);transition:all .18s;text-align:center}
.itab:hover{background:var(--parch2);color:var(--ink)}
.itab.active{background:var(--gold);color:white}

/* CARDS */
.card{background:white;border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);animation:up .22s ease}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-h{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* KEY FACTS */
.facts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.fact-box{padding:12px 14px;border-radius:var(--rs);border:1.5px solid}
.fact-box.gold{background:var(--gold-light);border-color:#fcd34d}
.fact-box.red{background:var(--red-bg);border-color:#fca5a5}
.fact-box.blue{background:var(--blue-bg);border-color:#93c5fd}
.fact-box.green{background:var(--green-bg);border-color:#86efac}
.fact-box.teal{background:var(--teal-bg);border-color:#5eead4}
.fact-box h3{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px}
.fact-box.gold h3{color:var(--gold)}
.fact-box.red h3{color:var(--red)}
.fact-box.blue h3{color:var(--blue)}
.fact-box.green h3{color:var(--green)}
.fact-box.teal h3{color:var(--teal)}
.fact-box ul{list-style:none;font-size:13px;line-height:1.9}
.fact-box.gold ul{color:#78350f}
.fact-box.red ul{color:#7f1d1d}
.fact-box.blue ul{color:#1e3a8a}
.fact-box.green ul{color:#14532d}
.fact-box.teal ul{color:#134e4a}
.fact-box ul li::before{content:"→ ";opacity:.5}

/* TIMELINE */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:9px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--gold),var(--border))}
.tl-item{position:relative;margin-bottom:14px}
.tl-dot{position:absolute;left:-23px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--gold);border:2px solid white;box-shadow:0 0 0 2px var(--gold)}
.tl-year{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--gold);margin-bottom:2px}
.tl-text{font-size:13px;line-height:1.6;color:var(--ink)}
.tl-text strong{color:var(--red);font-weight:700}

/* PEOPLE */
.people-grid{display:flex;flex-direction:column;gap:8px}
.person{display:flex;gap:12px;align-items:flex-start;background:var(--parch2);border-radius:var(--rs);padding:10px 14px;border:1px solid var(--border)}
.person-ico{font-size:22px;flex-shrink:0}
.person-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.person-role{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:3px}
.person-fact{font-size:13px;line-height:1.5;color:var(--ink)}

/* FLASHCARDS */
.fc-info{font-size:13px;color:var(--muted);margin-bottom:14px;text-align:center}
.flashcard{
  perspective:1000px;width:100%;min-height:180px;cursor:pointer;margin-bottom:12px;
}
.fc-inner{
  position:relative;width:100%;min-height:180px;
  transform-style:preserve-3d;transition:transform .5s;border-radius:var(--r);
}
.flashcard.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{
  position:absolute;width:100%;min-height:180px;backface-visibility:hidden;
  border-radius:var(--r);padding:24px 20px;display:flex;flex-direction:column;justify-content:center;
  border:2px solid var(--border);box-shadow:var(--shadow);
}
.fc-front{background:white;text-align:center}
.fc-back{background:var(--gold-light);transform:rotateY(180deg);border-color:var(--gold)}
.fc-front .fc-q{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--ink);line-height:1.4;margin-bottom:10px}
.fc-front .fc-tap{font-size:12px;color:var(--muted)}
.fc-back .fc-a{font-size:15px;line-height:1.7;color:var(--ink)}
.fc-back .fc-a strong{color:var(--red);font-weight:700}
.fc-nav{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.fc-count{font-size:13px;color:var(--muted)}

/* QUIZ */
.prog-bar{height:6px;background:var(--parch2);border-radius:99px;margin-bottom:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-bright));border-radius:99px;transition:width .4s}
.score-row{display:flex;gap:14px;font-size:13px;color:var(--muted);margin-bottom:14px}
.score-row b{color:var(--ink)}
.q-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-weight:600}
.q-text{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;line-height:1.5;margin-bottom:8px}
.q-hint{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{padding:11px 16px;border:1.5px solid var(--border);border-radius:var(--rs);
  font-family:'Source Sans 3',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;background:white;color:var(--ink);text-align:left;transition:all .15s}
.opt:hover:not(:disabled){border-color:var(--gold-bright);background:var(--gold-light)}
.opt.ok{background:var(--green-bg);border-color:#6ee7b7;color:#14532d}
.opt.no{background:var(--red-bg);border-color:#fca5a5;color:#7f1d1d}
.feedback{margin-top:12px;padding:12px 16px;border-radius:var(--rs);font-size:14px;line-height:1.7;animation:up .2s ease}
.feedback.ok{background:var(--green-bg);color:#14532d;border:1px solid #6ee7b7}
.feedback.no{background:var(--red-bg);color:#7f1d1d;border:1px solid #fca5a5}
.expl{margin-top:8px;background:white;border-radius:8px;padding:10px 13px;font-size:13px;color:var(--blue);line-height:1.7;border:1px solid #bfdbfe}
.nav-row{display:flex;justify-content:flex-end;margin-top:12px}
.btn{padding:10px 22px;border-radius:var(--rs);border:none;font-family:'Source Sans 3',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-gold{background:var(--gold);color:white;box-shadow:0 2px 10px rgba(184,134,11,.3)}
.btn-gold:hover{background:#a16207;transform:translateY(-1px)}
.btn-sec{background:white;color:var(--ink);border:1.5px solid var(--border)}
.btn-sec:hover{background:var(--parch2)}

/* RESULT */
.result{text-align:center;padding:10px 0 20px}
.result .big{font-family:'Playfair Display',serif;font-size:60px;font-weight:900;color:var(--gold);line-height:1}
.result .msg{font-size:16px;color:var(--muted);margin:10px 0 20px}
.result-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.mistake-card{background:#fff9f0;border:1.5px solid #fcd34d;border-radius:var(--rs);padding:14px;margin-bottom:10px;text-align:left}
.m-q{font-family:'Playfair Display',serif;font-weight:700;font-size:14px;margin-bottom:4px;color:var(--ink)}
.m-w{font-size:13px;color:var(--red);margin-bottom:4px}
.m-c{display:inline-block;background:var(--green-bg);color:#14532d;font-size:13px;font-weight:700;padding:3px 10px;border-radius:6px;margin-bottom:7px}
.m-rule{font-size:13px;color:var(--blue);background:var(--blue-bg);padding:8px 12px;border-radius:8px;line-height:1.7}

@media(max-width:500px){
  .facts-grid{grid-template-columns:1fr}
  .topic-grid{grid-template-columns:1fr}
  .hero h1{font-size:24px}
  .result .big{font-size:44px}
}
</style>
</head>

function setTab(id){
  currentTab=id; fcIndex=0; fcFlipped=false;
  if(id==='quiz'){qi=0;sel=null;score=0;mistakes=[];qList=[...ALL_QUIZ.filter(q=>q.tid===currentTopic.id)].sort(()=>Math.random()-.5);}
  renderInnerTabs(); render();
}

function renderTopics(){
  document.getElementById('topic-grid').innerHTML=TOPICS.map(t=>`
    <button class="topic-btn${t.id===currentTopic.id?' active':''}" onclick="setTopic('${t.id}')">
      <div class="t-num">${t.icon} ${t.num}</div>
      <div class="t-name">${t.name}</div>
      <div class="t-era">${t.era}</div>
    </button>`).join('');
}
function renderInnerTabs(){
  document.getElementById('inner-tabs').innerHTML=INNER_TABS.map(t=>`
    <button class="itab${t.id===currentTab?' active':''}" onclick="setTab('${t.id}')">${t.label}</button>`).join('');
}

// ═══════════════════════════════════════════════════════════ RENDERS

function renderTheory(){
  const t=currentTopic;
  const colClass={gold:'gold',red:'red',blue:'blue',green:'green',teal:'teal'};
  const factsHTML=t.facts.map(f=>`
    <div class="fact-box ${colClass[f.type]||'gold'}">
      <h3>${f.title}</h3>
      <ul>${f.items.map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>`).join('');
  return `
<div class="card">
  <div class="card-h">${t.icon} ${t.name}</div>
  <p style="font-size:14px;color:var(--muted);margin-bottom:14px;line-height:1.6">${t.summary}</p>
  <div class="facts-grid">${factsHTML}</div>
</div>
<div style="margin-top:4px">
  <button class="btn btn-gold" onclick="setTab('timeline')">📅 Chronologia →</button>
</div>`;
}

function renderTimeline(){
  const t=currentTopic;
  return `
<div class="card">
  <div class="card-h">📅 Chronologia — ${t.name}</div>
  <div class="timeline">
    ${t.timeline.map(item=>`
      <div class="tl-item">
        <div class="tl-dot"></div>
        <div class="tl-year">${item.y}</div>
        <div class="tl-text">${item.t}</div>
      </div>`).join('')}
  </div>
</div>`;
}

function renderPeople(){
  const t=currentTopic;
  return `
<div class="card">
  <div class="card-h">👤 Ważne postacie — ${t.name}</div>
  <div class="people-grid">
    ${t.people.map(p=>`
      <div class="person">
        <div class="person-ico">${p.ico}</div>
        <div>
          <div class="person-name">${p.name}</div>
          <div class="person-role">${p.role}</div>
          <div class="person-fact">${p.fact}</div>
        </div>
      </div>`).join('')}
  </div>
</div>`;
}

function renderFlash(){
  const cards=currentTopic.flashcards;
  const c=cards[fcIndex];
  return `
<div class="card">
  <div class="card-h">🃏 Fiszki — ${currentTopic.name}</div>
  <div class="fc-info">Kliknij kartę, by zobaczyć odpowiedź · ${fcIndex+1} z ${cards.length}</div>
  <div class="flashcard${fcFlipped?' flipped':''}" onclick="flipCard()">
    <div class="fc-inner">
      <div class="fc-front">
        <div class="fc-q">${c.q}</div>
        <div class="fc-tap">👆 Kliknij, by zobaczyć odpowiedź</div>
      </div>
      <div class="fc-back">
        <div class="fc-a">${c.a}</div>
      </div>
    </div>
  </div>
  <div class="fc-nav">
    <button class="btn btn-sec" onclick="fcNav(-1)" ${fcIndex===0?'disabled':''}>← Poprzednia</button>
    <span class="fc-count">${fcIndex+1} / ${cards.length}</span>
    <button class="btn btn-gold" onclick="fcNav(1)" ${fcIndex===cards.length-1?'disabled':''}>Następna →</button>
  </div>
</div>`;
}

function flipCard(){fcFlipped=!fcFlipped;render();}
function fcNav(d){fcIndex+=d;fcFlipped=false;render();}

function renderQuiz(){
  if(qi>=qList.length) return renderResult();
  const q=qList[qi];
  const total=qList.length;
  const pct=Math.round((qi/total)*100);
  const optsHTML=q.opts.map((o,i)=>{
    let cls='opt';
    if(sel!==null){if(i===q.a)cls+=' ok';else if(i===sel&&sel!==q.a)cls+=' no';}
    return `<button class="${cls}" onclick="choose(${i})" ${sel!==null?'disabled':''}>${o}</button>`;
  }).join('');
  let fb='';
  if(sel!==null){
    if(sel===q.a)fb=`<div class="feedback ok">✓ Правильно! <div class="expl">${q.expl}</div></div>`;
    else fb=`<div class="feedback no">✗ Правильna: <strong>${q.opts[q.a]}</strong><div class="expl">${q.expl}</div></div>`;
  }
  return `
<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
<div class="score-row">
  <span>Pytanie <b>${qi+1}/${total}</b></span>
  <span>✅ <b style="color:var(--green)">${score}</b></span>
  <span>❌ <b style="color:var(--red)">${mistakes.length}</b></span>
</div>
<div class="card">
  <div class="q-label">Pytanie ${qi+1}</div>
  <div class="q-text">${q.q}</div>
  <div class="q-hint">💡 ${q.hint}</div>
  <div class="opts">${optsHTML}</div>
  ${fb}
</div>
<div class="nav-row">${sel!==null?`<button class="btn btn-gold" onclick="nextQ()">Dalej →</button>`:''}</div>`;
}

function renderResult(){
  const total=qList.length;
  const pct=Math.round((score/total)*100);
  const emoji=pct>=80?'🎉':pct>=60?'👍':'📚';
  const stars=pct>=100?'⭐⭐⭐':pct>=80?'⭐⭐':pct>=60?'⭐':'';
  const msg=pct>=80?'Warwara jest gotowa!':pct>=60?'Dobrze! Powtórz błędy.':'Przeczytaj teorię jeszcze raz.';
  const mHTML=mistakes.length?`
    <div style="margin-top:20px;text-align:left">
      <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;margin-bottom:12px">Błędy do powtórzenia:</div>
      ${mistakes.map(m=>`
        <div class="mistake-card">
          <div class="m-q">${m.q}</div>
          <div class="m-w">Ти відповіла: <b>${m.wrong}</b></div>
          <div class="m-c">✓ ${m.correct}</div>
          <div class="m-rule">${m.rule}</div>
        </div>`).join('')}
    </div>`:'';
  return `<div class="card"><div class="result">
    <div style="font-size:48px">${emoji}</div>
    <div style="font-size:28px;margin:6px 0">${stars}</div>
    <div class="big">${score}/${total}</div>
    <div class="msg">${msg}</div>
    <div class="result-btns">
      <button class="btn btn-sec" onclick="setTab('theory')">📖 Teoria</button>
      <button class="btn btn-sec" onclick="setTab('flash')">🃏 Fiszki</button>
      <button class="btn btn-gold" onclick="setTab('quiz')">Spróbuj ponownie ↺</button>
    </div>
    ${mHTML}
  </div></div>`;
}

function choose(i){
  if(sel!==null)return;
  sel=i;
  const q=qList[qi];
  if(i===q.a)score++;
  else mistakes.push({q:q.q,wrong:q.opts[i],correct:q.opts[q.a],rule:q.expl});
  render();
}
function nextQ(){qi++;sel=null;render();}

function render(){
  const c=document.getElementById('content');
  if(currentTab==='theory')   c.innerHTML=renderTheory();
  else if(currentTab==='timeline')c.innerHTML=renderTimeline();
  else if(currentTab==='people')  c.innerHTML=renderPeople();
  else if(currentTab==='flash')   c.innerHTML=renderFlash();
  else c.innerHTML=renderQuiz();
}

setTopic('osw');
</script>
</body>
</html>
