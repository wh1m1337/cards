<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Quiz · Варвара</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --card: #ffffff;
    --border: #e2e8f4;
    --text: #1a1f36;
    --muted: #6b7494;
    --blue-bg: #dbeafe;
    --blue: #2563eb;
    --blue-dark: #1d4ed8;
    --green-bg: #dcfce7;
    --green: #16a34a;
    --green-dark: #15803d;
    --red-bg: #fee2e2;
    --red: #dc2626;
    --amber-bg: #fef9c3;
    --amber: #ca8a04;
    --radius: 14px;
    --radius-sm: 9px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(circle at 20% 20%, #c7d7ff 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, #d4f0e8 0%, transparent 50%);
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* TOP HEADER */
  .top-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .top-header .badge {
    display: inline-block;
    background: var(--blue);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 99px;
    margin-bottom: 12px;
  }
  .top-header h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .top-header p {
    font-size: 14px;
    color: var(--muted);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    background: var(--card);
    padding: 6px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    min-width: 120px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.18s;
    text-align: center;
  }
  .tab:hover { background: var(--bg); color: var(--text); }
  .tab.active { background: var(--blue); color: white; }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* THEORY */
  .theory-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .theory-box {
    padding: 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid;
  }
  .theory-box.blue { background: var(--blue-bg); border-color: #93c5fd; }
  .theory-box.green { background: var(--green-bg); border-color: #86efac; }
  .theory-box h3 {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .theory-box.blue h3 { color: var(--blue-dark); }
  .theory-box.green h3 { color: var(--green-dark); }
  .theory-box ul { list-style: none; font-size: 13px; line-height: 1.9; }
  .theory-box.blue ul { color: #1e40af; }
  .theory-box.green ul { color: #166534; }
  .theory-box ul li::before { content: "→ "; opacity: 0.5; }

  .example-strip {
    background: #f8faff;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 14px;
    line-height: 2;
  }
  .ex-pp { color: var(--blue-dark); font-style: italic; }
  .ex-ps { color: var(--green-dark); font-style: italic; }

  .since-for-card {
    background: var(--amber-bg);
    border: 1.5px solid #fde047;
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-top: 16px;
  }
  .sf-title {
    background: #fef08a;
    padding: 10px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: #713f12;
    border-bottom: 1px solid #fde047;
  }
  .sf-body { display: grid; grid-template-columns: 1fr 1fr; }
  .sf-col { padding: 14px 16px; font-size: 13px; line-height: 2; }
  .sf-col:first-child { border-right: 1px solid #fde047; }
  .sf-col strong { display: block; font-weight: 800; margin-bottom: 4px; font-size: 14px; }
  .sf-col:first-child strong { color: #dc2626; }
  .sf-col:last-child strong { color: #1d4ed8; }
  .sf-col span { display: block; color: #78350f; }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 14px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), #60a5fa); border-radius: 99px; transition: width 0.4s ease; }
  .score-row { display: flex; gap: 16px; margin-top: 8px; font-size: 13px; color: var(--muted); }
  .score-row b { color: var(--text); }

  /* QUESTION CARD */
  .q-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  .q-text { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.5; margin-bottom: 6px; }
  .q-hint { font-size: 13px; color: var(--muted); margin-bottom: 16px; font-style: italic; }

  .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .opt {
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: var(--card);
    color: var(--text);
    text-align: left;
    transition: all 0.15s;
  }
  .opt:hover:not(:disabled) { border-color: var(--blue); background: var(--blue-bg); color: var(--blue-dark); }
  .opt.highlight { background: var(--green-bg); border-color: var(--green); color: var(--green-dark); }
  .opt.wrong { background: var(--red-bg); border-color: var(--red); color: #991b1b; }

  .feedback {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    line-height: 1.7;
    animation: fadeUp 0.2s ease;
  }
  .feedback.ok { background: var(--green-bg); color: #14532d; border: 1px solid #86efac; }
  .feedback.no { background: var(--red-bg); color: #7f1d1d; border: 1px solid #fca5a5; }
  .rule-box {
    margin-top: 8px;
    background: white;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.7;
    color: #1e3a8a;
    border: 1px solid #bfdbfe;
  }

  .nav-row { display: flex; justify-content: flex-end; margin-top: 14px; }
  .btn {
    padding: 10px 24px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: var(--blue-dark); transform: translateY(-1px); }
  .btn-sec { background: var(--card); color: var(--text); border: 1.5px solid var(--border); }
  .btn-sec:hover { background: var(--bg); }

  /* RESULT */
  .result { text-align: center; padding: 10px 0 16px; }
  .result .emoji { font-size: 48px; margin-bottom: 8px; }
  .result .big-score { font-family: 'Nunito', sans-serif; font-size: 52px; font-weight: 800; color: var(--blue); line-height: 1; margin: 10px 0; }
  .result .msg { font-size: 16px; color: var(--muted); margin-bottom: 20px; }
  .result-btns { display: flex; gap: 8px; justify-content: center; }

  /* MISTAKES */
  .mistakes-section { margin-top: 20px; text-align: left; }
  .mistakes-title { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; margin-bottom: 12px; }
  .mistake-card {
    background: #fff5f5;
    border: 1.5px solid #fca5a5;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .m-q { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: #7f1d1d; }
  .m-wrong { font-size: 13px; color: #991b1b; margin-bottom: 4px; }
  .m-correct { display: inline-block; background: var(--green-bg); color: #14532d; font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 6px; margin-bottom: 8px; }
  .m-rule { font-size: 13px; color: #1e40af; background: var(--blue-bg); padding: 8px 12px; border-radius: 8px; line-height: 1.7; }

  /* MOBILE */
  @media (max-width: 480px) {
    .theory-grid { grid-template-columns: 1fr; }
    .sf-body { grid-template-columns: 1fr; }
    .sf-col:first-child { border-right: none; border-bottom: 1px solid #fde047; }
    .opts { grid-template-columns: 1fr; }
    .tab { font-size: 12px; min-width: 90px; }
    .top-header h1 { font-size: 22px; }
    .result .big-score { font-size: 40px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="top-header">
    <div class="badge">6th grade · English</div>
    <h1>Present Perfect &amp;<br>Past Simple</h1>
    <p>Підготовка до карткóвки · Since / For · Варвара</p>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="content"></div>

</div>

<script>
const THEORY_HTML = `
<div class="card">
  <div class="theory-grid">
    <div class="theory-box blue">
      <h3>Present Perfect</h3>
      <ul>
        <li>Look! результат видно ЗАРАЗ</li>
        <li>досвід у житті (ever/never)</li>
        <li>з since / for</li>
        <li>just, already, yet</li>
      </ul>
    </div>
    <div class="theory-box green">
      <h3>Past Simple</h3>
      <ul>
        <li>конкретний час у минулому</li>
        <li>yesterday, ago, last week</li>
        <li>in 2020, on Monday</li>
        <li>дія закінчилась, час відомий</li>
      </ul>
    </div>
  </div>
  <div class="example-strip">
    <div class="ex-pp">Look! I <b>have broken</b> my arm. → рука зламана, бачимо зараз</div>
    <div class="ex-ps">I <b>broke</b> my arm yesterday. → це сталось вчора (конкретний час)</div>
  </div>
  <div class="since-for-card">
    <div class="sf-title">Since vs For (тільки з Present Perfect)</div>
    <div class="sf-body">
      <div class="sf-col">
        <strong>SINCE = з якого часу</strong>
        <span>since Monday</span>
        <span>since 2020</span>
        <span>since I was a child</span>
        <span>since last summer</span>
      </div>
      <div class="sf-col">
        <strong>FOR = протягом скількох</strong>
        <span>for 3 days</span>
        <span>for two years</span>
        <span>for a long time</span>
        <span>for ages</span>
      </div>
    </div>
  </div>
</div>
<div style="display:flex;gap:8px;margin-top:4px">
  <button class="btn btn-primary" onclick="initSet('pp_ps')">Почати тест →</button>
</div>`;

const SETS = {
  theory: null,
  pp_ps: [
    { q: 'Look! She ___ her key. (lose)', opts: ['lost','has lost','loses','losing'], a: 1, hint: 'Look! = бачимо результат зараз', rule: 'Look! / Oh no! → Present Perfect, бо ми бачимо результат прямо зараз. She has lost = ключ загублений (і ми це бачимо).' },
    { q: 'I ___ my homework an hour ago. (finish)', opts: ['have finished','finished','finish','had finished'], a: 1, hint: '"an hour ago" = конкретний час у минулому', rule: 'ago, yesterday, last…, in [рік] → Past Simple. Час конкретний → Past Simple. I finished an hour ago.' },
    { q: '___ you ever ___ sushi? (eat)', opts: ['Did … eat','Have … eaten','Do … eat','Are … eating'], a: 1, hint: '"ever" + досвід у житті', rule: '"Ever" запитує про досвід у житті → Present Perfect. Have you ever eaten sushi?' },
    { q: 'She ___ in Warsaw since 2019. (live)', opts: ['lived','lives','has lived','was living'], a: 2, hint: '"since" → Present Perfect', rule: 'Since + рік/момент → Present Perfect. She has lived here since 2019 = вона живе тут з 2019 (і досі).' },
    { q: 'We ___ this film last Friday. (see)', opts: ['have seen','saw','seen','see'], a: 1, hint: '"last Friday" = конкретний час', rule: 'Last Friday / yesterday / in 2020 → Past Simple. We saw the film last Friday.' },
    { q: 'He has already ___ the email. (send)', opts: ['send','sended','sent','sending'], a: 2, hint: 'have/has + 3-я форма (past participle)', rule: 'Present Perfect = have/has + past participle. Send → sent (неправильне дієслово!).' },
    { q: 'Look! Tom ___ his leg! (break)', opts: ['broke','has broken','breaks','broken'], a: 1, hint: 'Look! = результат видно зараз', rule: 'Look! → Present Perfect. Tom has broken his leg = нога зламана (бачимо зараз). Порівняй: He broke his leg in 2020 → Past Simple.' },
    { q: 'I ___ my bike when I was ten. (buy)', opts: ["haven't bought",'bought','have bought','buy'], a: 1, hint: '"when I was ten" = конкретний вік у минулому', rule: '"When I was…" → Past Simple, бо вказано конкретний час у минулому.' },
  ],
  since_for: [
    { q: 'I have known her ___ five years.', opts: ['since','for','ago','in'], a: 1, hint: 'five years = тривалість (скільки?)', rule: 'FOR + тривалість: for five years, for two months, for a long time. Питання: How long?' },
    { q: 'She has been ill ___ Monday.', opts: ['for','in','since','during'], a: 2, hint: 'Monday = конкретний момент початку', rule: 'SINCE + момент початку: since Monday, since 3 o\'clock, since last year. Питання: Since when?' },
    { q: 'We haven\'t eaten ___ this morning.', opts: ['for','since','from','ago'], a: 1, hint: '"this morning" = конкретний момент', rule: 'SINCE + конкретний момент (this morning, yesterday, last week). We haven\'t eaten since this morning.' },
    { q: 'They\'ve been friends ___ ages.', opts: ['since','for','during','from'], a: 1, hint: '"ages" = тривалість (довгий час)', rule: 'FOR + тривалість: for ages, for a long time, for 20 years. "Ages" = дуже довго.' },
    { q: 'He has worked here ___ he was 20.', opts: ['for','since','in','during'], a: 1, hint: '"he was 20" = момент у минулому', rule: 'SINCE + підрядне речення (since he was young, since she arrived). He has worked here since he was 20.' },
    { q: 'I haven\'t seen you ___ a long time!', opts: ['since','for','during','from'], a: 1, hint: '"a long time" = тривалість', rule: 'FOR a long time = протягом довгого часу. I haven\'t seen you for a long time!' },
    { q: 'My parents have been married ___ 1998.', opts: ['for','in','since','during'], a: 2, hint: '1998 = конкретний рік (початок)', rule: 'SINCE + рік/дата. They have been married since 1998 = одружені з 1998 року.' },
    { q: 'She has studied English ___ three months.', opts: ['since','for','in','from'], a: 1, hint: '"three months" = тривалість', rule: 'FOR + кількість часу: for three months, for a week, for 10 minutes.' },
  ],
  mixed: [
    { q: 'Oops! I ___ the window! (break)', opts: ['broke','have broken','breaking','broken'], a: 1, hint: 'Oops! = бачимо наслідок зараз', rule: 'Oops! / Look! / Oh no! → Present Perfect. I have broken = вікно зламане (і бачимо це).' },
    { q: 'She ___ her bike last summer. (break)', opts: ['has broken','broken','broke','breaks'], a: 2, hint: '"last summer" = конкретний час', rule: 'Last summer → Past Simple. She broke her bike last summer. Немає зв\'язку з теперішнім.' },
    { q: 'They haven\'t called ___ two days.', opts: ['since','for','in','ago'], a: 1, hint: 'two days = тривалість', rule: 'FOR + тривалість. They haven\'t called for two days = два дні вже не дзвонять.' },
    { q: 'I have lived here ___ I was born.', opts: ['for','since','in','during'], a: 1, hint: '"I was born" = момент початку', rule: 'SINCE + момент (since I was born, since she arrived). I have lived here since I was born.' },
    { q: 'He ___ in London for 5 years, then moved. (live)', opts: ['has lived','lived','lives','is living'], a: 1, hint: 'Дія закінчилась — він вже переїхав', rule: 'Якщо дія закінчилась → Past Simple. He lived in London for 5 years (then moved). Порівняй: He HAS lived here for 5 years (і досі живе).' },
    { q: '___ you ___ your keys? I can\'t find them! (lose)', opts: ['Did … lose','Have … lost','Do … lose','Are … losing'], a: 1, hint: 'Я шукаю їх ЗАРАЗ — результат важливий', rule: 'Present Perfect коли результат важливий зараз. Have you lost your keys? = де вони (хочу знайти зараз).' },
    { q: 'I ___ born in Kyiv ___ 2014. (be)', opts: ['was … in','have been … since','was … since','am … in'], a: 0, hint: 'Народження = Past Simple + in + рік', rule: 'I was born → Past Simple (конкретна дія в минулому). З роком народження завжди "in": born in 2014.' },
    { q: 'How long ___ you ___ English? (study)', opts: ['did … study','have … studied','do … study','are … studying'], a: 1, hint: '"How long" з since/for → Present Perfect', rule: '"How long have you…?" → Present Perfect. Питаємо про тривалість дії, яка ще триває.' },
  ]
};

const SET_LABELS = {
  theory: '📖 Теорія',
  pp_ps: 'PP vs Past',
  since_for: 'Since / For',
  mixed: '🔀 Змішане'
};

let currentSet = 'theory';
let qList = [], qi = 0, sel = null, score = 0, mistakes = [];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function initSet(id) {
  currentSet = id;
  if (id !== 'theory') {
    qList = shuffle(SETS[id]);
    qi = 0; sel = null; score = 0; mistakes = [];
  }
  renderTabs();
  render();
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = Object.keys(SET_LABELS).map(id =>
    `<button class="tab${id === currentSet ? ' active' : ''}" onclick="initSet('${id}')">${SET_LABELS[id]}</button>`
  ).join('');
}

function render() {
  const c = document.getElementById('content');
  if (currentSet === 'theory') { c.innerHTML = THEORY_HTML; return; }
  if (qi >= qList.length) { renderResult(); return; }

  const q = qList[qi];
  const total = qList.length;
  const pct = Math.round((qi / total) * 100);

  const optsHTML = q.opts.map((o, i) => {
    let cls = 'opt';
    if (sel !== null) {
      if (i === q.a) cls += ' highlight';
      else if (i === sel && sel !== q.a) cls += ' wrong';
    }
    return `<button class="${cls}" onclick="choose(${i})" ${sel !== null ? 'disabled' : ''}>${o}</button>`;
  }).join('');

  let fb = '';
  if (sel !== null) {
    if (sel === q.a) {
      fb = `<div class="feedback ok">✓ Правильно! <div class="rule-box">${q.rule}</div></div>`;
    } else {
      fb = `<div class="feedback no">✗ Правильна відповідь: <strong>${q.opts[q.a]}</strong><div class="rule-box">${q.rule}</div></div>`;
    }
  }

  c.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="score-row">
        <span>Питання <b>${qi + 1} / ${total}</b></span>
        <span>Правильно <b style="color:var(--green)">${score}</b></span>
        <span>Помилки <b style="color:var(--red)">${mistakes.length}</b></span>
      </div>
    </div>
    <div class="card">
      <div class="q-label">Оберіть правильний варіант</div>
      <div class="q-text">${q.q}</div>
      <div class="q-hint">💡 ${q.hint}</div>
      <div class="opts">${optsHTML}</div>
      ${fb}
    </div>
    <div class="nav-row">${sel !== null ? `<button class="btn btn-primary" onclick="nextQ()">Далі →</button>` : ''}</div>`;
}

function choose(i) {
  if (sel !== null) return;
  sel = i;
  const q = qList[qi];
  if (i === q.a) score++;
  else mistakes.push({ q: q.q, wrong: q.opts[i], correct: q.opts[q.a], rule: q.rule });
  render();
}

function nextQ() { qi++; sel = null; render(); }

function renderResult() {
  const total = qList.length;
  const pct = Math.round((score / total) * 100);
  const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '📚';
  const msg = pct >= 80 ? 'Варвара готова до карткóвки!' : pct >= 60 ? 'Непогано! Повтори помилки ще раз.' : 'Ще раз прочитай теорію і спробуй знову.';

  const mHTML = mistakes.length ? `
    <div class="mistakes-section">
      <div class="mistakes-title">Розбір помилок:</div>
      ${mistakes.map(m => `
        <div class="mistake-card">
          <div class="m-q">${m.q}</div>
          <div class="m-wrong">Ти відповіла: <b>${m.wrong}</b></div>
          <div class="m-correct">✓ Правильно: ${m.correct}</div>
          <div class="m-rule">${m.rule}</div>
        </div>`).join('')}
    </div>` : '';

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="result">
        <div class="emoji">${emoji}</div>
        <div class="big-score">${score}/${total}</div>
        <div class="msg">${msg}</div>
        <div class="result-btns">
          <button class="btn btn-sec" onclick="initSet('theory')">📖 Теорія</button>
          <button class="btn btn-primary" onclick="initSet('${currentSet}')">Ще раз ↺</button>
        </div>
        ${mHTML}
      </div>
    </div>`;
}

initSet('theory');
</script>
</body>
</html>
