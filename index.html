<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matematyka · Річна контрольна · Варвара</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafafa;--card:#fff;--ink:#111827;--muted:#6b7280;--border:#e5e7eb;
  --t1:#2563eb;--t1b:#dbeafe;--t1d:#1d4ed8;
  --t2:#059669;--t2b:#d1fae5;--t2d:#065f46;
  --t3:#7c3aed;--t3b:#ede9fe;--t3d:#5b21b6;
  --t4:#dc2626;--t4b:#fee2e2;--t4d:#991b1b;
  --t5:#d97706;--t5b:#fef3c7;--t5d:#92400e;
  --t6:#0891b2;--t6b:#cffafe;--t6d:#164e63;
  --t7:#be185d;--t7b:#fce7f3;--t7d:#9d174d;
  --t8:#4f46e5;--t8b:#e0e7ff;--t8d:#3730a3;
  --ok:#16a34a;--okb:#dcfce7;--err:#dc2626;--errb:#fee2e2;
  --r:14px;--rs:8px;--sh:0 2px 12px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.page{max-width:720px;margin:0 auto;padding:20px 14px 80px}

/* HERO */
.hero{text-align:center;padding:24px 0 20px;margin-bottom:20px;
  background:linear-gradient(135deg,#1d4ed8 0%,#7c3aed 50%,#059669 100%);
  border-radius:20px;color:white}
.hero .badge{display:inline-block;background:rgba(255,255,255,.2);
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:4px 14px;border-radius:99px;margin-bottom:12px}
.hero h1{font-size:26px;font-weight:800;line-height:1.2;margin-bottom:6px}
.hero p{font-size:13px;opacity:.8}

/* TOPIC GRID */
.topic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px}
.tcard{
  padding:12px 14px;border:2px solid var(--border);border-radius:var(--r);
  background:var(--card);cursor:pointer;transition:all .16s;box-shadow:var(--sh);
  display:flex;align-items:center;gap:10px;
}
.tcard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.tcard .tc-ico{font-size:22px;flex-shrink:0}
.tcard .tc-body{min-width:0}
.tcard .tc-num{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.tcard .tc-name{font-size:13px;font-weight:700;color:var(--ink);line-height:1.3}
.tcard.active{border-width:2px;background:var(--c-bg,#dbeafe)}

/* INNER TABS */
.itabs{display:flex;gap:4px;background:var(--card);padding:4px;
  border-radius:var(--r);border:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.itab{flex-shrink:0;padding:7px 12px;border-radius:var(--rs);border:none;
  font-family:'Sora',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;background:transparent;color:var(--muted);transition:all .16s;white-space:nowrap}
.itab:hover{background:var(--bg)}
.itab.active{color:white}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:18px;margin-bottom:12px;box-shadow:var(--sh);animation:up .2s ease}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card-h{font-size:16px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* THEORY BLOCKS */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.tbox{padding:12px 13px;border-radius:var(--rs);border:1.5px solid}
.tbox h3{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.tbox ul{list-style:none;font-size:13px;line-height:2}
.tbox ul li::before{content:"• ";opacity:.4}

/* FORMULA BOX */
.formula{background:var(--c-bg,#dbeafe);border:1.5px solid var(--c,#2563eb);
  border-radius:var(--rs);padding:14px 16px;margin-bottom:12px;font-size:14px;line-height:2}
.formula strong{color:var(--c-d,#1d4ed8);font-weight:800}
.math{font-family:'JetBrains Mono',monospace;background:rgba(0,0,0,.05);
  padding:2px 7px;border-radius:5px;font-size:13px}

/* EXAMPLES */
.ex-list{display:flex;flex-direction:column;gap:10px}
.ex-item{background:var(--bg);border-radius:var(--rs);border:1px solid var(--border);overflow:hidden}
.ex-q{padding:10px 14px;font-size:14px;font-weight:600;border-bottom:1px solid var(--border)}
.ex-steps{padding:10px 14px}
.ex-step{display:flex;gap:8px;margin-bottom:6px;font-size:13px;line-height:1.6;align-items:flex-start}
.ex-step-n{width:20px;height:20px;border-radius:50%;background:var(--c,#2563eb);color:white;
  font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ex-ans{background:var(--okb);color:#14532d;font-weight:700;font-size:13px;
  padding:7px 12px;border-radius:6px;margin-top:6px;display:inline-block}

/* QUIZ */
.prog-bar{height:5px;background:var(--border);border-radius:99px;margin-bottom:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--c,#2563eb);transition:width .4s}
.score-row{display:flex;gap:14px;font-size:12px;color:var(--muted);margin-bottom:12px}
.score-row b{color:var(--ink)}
.q-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:700}
.q-text{font-size:16px;font-weight:800;line-height:1.5;margin-bottom:6px}
.q-hint{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:12px}
.opts{display:flex;flex-direction:column;gap:6px}
.opt{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--rs);
  font-family:'Sora',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;background:var(--card);color:var(--ink);text-align:left;transition:all .14s}
.opt:hover:not(:disabled){border-color:var(--c,#2563eb);background:var(--c-bg,#dbeafe)}
.opt.ok{background:var(--okb);border-color:#86efac;color:#14532d;font-weight:700}
.opt.no{background:var(--errb);border-color:#fca5a5;color:#7f1d1d}
.feedback{margin-top:10px;padding:11px 14px;border-radius:var(--rs);font-size:13px;line-height:1.7;animation:up .18s ease}
.feedback.ok{background:var(--okb);color:#14532d;border:1px solid #86efac}
.feedback.no{background:var(--errb);color:#7f1d1d;border:1px solid #fca5a5}
.expl{margin-top:7px;background:white;border-radius:7px;padding:8px 12px;font-size:13px;color:#1e3a8a;line-height:1.7;border:1px solid #bfdbfe}
.nav-row{display:flex;justify-content:flex-end;margin-top:10px}
.btn{padding:9px 20px;border-radius:var(--rs);border:none;font-family:'Sora',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .14s}
.btn-pri{background:var(--c,#2563eb);color:white}
.btn-pri:hover{filter:brightness(.9);transform:translateY(-1px)}
.btn-sec{background:var(--card);color:var(--ink);border:1.5px solid var(--border)}
.btn-sec:hover{background:var(--bg)}

/* RESULT */
.result{text-align:center;padding:10px 0 16px}
.result .big{font-size:54px;font-weight:800;color:var(--c,#2563eb);line-height:1}
.result .msg{font-size:15px;color:var(--muted);margin:8px 0 18px}
.result-btns{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.mk{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:var(--rs);padding:12px;margin-bottom:8px;text-align:left}
.mk-q{font-weight:700;font-size:13px;margin-bottom:4px}
.mk-w{font-size:12px;color:var(--err);margin-bottom:3px}
.mk-c{display:inline-block;background:var(--okb);color:#14532d;font-size:12px;font-weight:700;padding:2px 9px;border-radius:5px;margin-bottom:6px}
.mk-r{font-size:12px;color:#1e3a8a;background:#dbeafe;padding:7px 11px;border-radius:7px;line-height:1.7}

/* FLASHCARDS */
.fc-meta{text-align:center;font-size:13px;color:var(--muted);margin-bottom:10px}
.flashcard{perspective:900px;width:100%;min-height:160px;cursor:pointer;margin-bottom:10px}
.fc-inner{position:relative;width:100%;min-height:160px;transform-style:preserve-3d;transition:transform .45s;border-radius:var(--r)}
.flashcard.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;width:100%;min-height:160px;backface-visibility:hidden;
  border-radius:var(--r);padding:20px;display:flex;flex-direction:column;justify-content:center;
  border:2px solid var(--border);box-shadow:var(--sh)}
.fc-front{background:white;text-align:center}
.fc-back{transform:rotateY(180deg);background:var(--c-bg,#dbeafe);border-color:var(--c,#2563eb)}
.fc-q{font-size:16px;font-weight:800;line-height:1.4;margin-bottom:7px}
.fc-tap{font-size:12px;color:var(--muted)}
.fc-a{font-size:14px;line-height:1.75}
.fc-a strong{color:var(--c-d,#1d4ed8)}
.fc-nav{display:flex;justify-content:space-between;align-items:center}
.fc-count{font-size:12px;color:var(--muted);font-weight:600}

@media(max-width:500px){
  .topic-grid{grid-template-columns:1fr}
  .tgrid{grid-template-columns:1fr}
  .hero h1{font-size:20px}
  .result .big{font-size:40px}
}
</style>
</head>
<body>

<div class="hero">

{id:'t4',ico:'🚀',num:'Rozd. 4',name:'Prędkość, droga, czas',
theory:{
  summary:'Trzy wzajemnie powiązane wielkości — jeśli znasz dwie, obliczasz trzecią. Kluczowe: spójne jednostki!',
  blocks:[
    {t:'t4',h:'Wzory — trójkąt PDT',items:['Droga = Prędkość × Czas','Prędkość = Droga ÷ Czas','Czas = Droga ÷ Prędkość','Zapamiętaj: D = P × T','Zasłoń szukaną — reszta podpowie!']},
    {t:'t4',h:'Jednostki',items:['Prędkość: km/h lub m/s','1 m/s = 3,6 km/h','Droga: km, m, cm','Czas: h, min, s','Zawsze ujednolicaj jednostki!']},
    {t:'t4',h:'Typowe błędy',items:['Czas musi być w godzinach (gdy v w km/h)','30 min = 0,5 h','1h 30min = 1,5 h','Przelicz minuty: min ÷ 60','Nie mieszaj km/h z m/s!']},
    {t:'t4',h:'Zadania złożone',items:['Dwa pojazdy naprzeciw: dodaj prędkości','Dwa pojazdy w tym samym kierunku: odejmuj','Czas spotkania: d ÷ (v₁ + v₂)','Zawsze zapisuj dane i szukaną','Sprawdzaj jednostki w odpowiedzi']},
  ],
  formulas:`<strong>Droga:</strong> <span class="math">d = v × t</span><br>
<strong>Prędkość:</strong> <span class="math">v = d ÷ t</span><br>
<strong>Czas:</strong> <span class="math">t = d ÷ v</span><br>
<strong>Uwaga:</strong> 1 h = 60 min, więc 30 min = <strong>0,5 h</strong>, 45 min = <strong>0,75 h</strong>`,
},
examples:[
  {q:'Samochód jedzie v=80 km/h przez t=2,5 h. Jaka droga?',steps:['d = v × t','d = 80 × 2,5','d = 200 km'],ans:'d = 200 km'},
  {q:'Przejechano 150 km w t=3 h. Jaka prędkość?',steps:['v = d ÷ t','v = 150 ÷ 3','v = 50 km/h'],ans:'v = 50 km/h'},
  {q:'d=90 km, v=60 km/h. Ile czasu?',steps:['t = d ÷ v','t = 90 ÷ 60 = 1,5 h','1,5 h = 1 godzina 30 minut'],ans:'1 h 30 min'},
],
flashcards:[
  {q:'Podaj trzy wzory trójkąta PDT',a:'<strong>d = v × t</strong> (droga = prędkość × czas)<br><strong>v = d ÷ t</strong> (prędkość = droga ÷ czas)<br><strong>t = d ÷ v</strong> (czas = droga ÷ prędkość)'},
  {q:'Jak zamienić 45 minut na godziny?',a:'45 min ÷ 60 = <strong>0,75 h</strong>. Bo 45/60 = 3/4 = 0,75. Zapamiętaj: 30 min = 0,5 h, 15 min = 0,25 h.'},
  {q:'Dwa pociągi jadą naprzeciwko siebie: 80 i 60 km/h. Dzielą je 280 km. Po ilu godzinach się spotkają?',a:'Dodajemy prędkości: 80+60=140 km/h. t = 280÷140 = <strong>2 h</strong>.'},
  {q:'Jak zapamiętać wzory PDT?',a:'Narysuj trójkąt: D na górze, P i T na dole. Zasłoń szukaną: D=P×T, P=D÷T, T=D÷P.'},
],
quiz:[
  {q:'v=60 km/h, t=3 h. Ile drogi?',opts:['20 km','63 km','180 km','200 km'],a:2,hint:'d = v × t',expl:'d = 60 × 3 = <strong>180 km</strong>.'},
  {q:'d=200 km, v=80 km/h. Ile czasu?',opts:['2 h','2,5 h','3 h','4 h'],a:1,hint:'t = d ÷ v',expl:'t = 200 ÷ 80 = <strong>2,5 h</strong> = 2 h 30 min.'},
  {q:'d=120 km, t=1,5 h. Jaka prędkość?',opts:['60 km/h','80 km/h','90 km/h','100 km/h'],a:1,hint:'v = d ÷ t',expl:'v = 120 ÷ 1,5 = <strong>80 km/h</strong>.'},
  {q:'45 minut = ile godzin?',opts:['0,4 h','0,75 h','0,45 h','4,5 h'],a:1,hint:'min ÷ 60',expl:'45 ÷ 60 = <strong>0,75 h</strong> (trzy czwarte godziny).'},
  {q:'Auto 90 km/h i rower 10 km/h jadą z tego samego miejsca w tym samym kierunku. Po 2h różnica drogi?',opts:['80 km','160 km','100 km','180 km'],a:1,hint:'Różnica prędkości × czas',expl:'Różnica v = 90−10 = 80 km/h. Po 2h: 80×2 = <strong>160 km</strong>.'},
]},

{id:'t5',ico:'📏',num:'Rozd. 5',name:'Pola wielokątów',

    {t:'t5',h:'Równoległobok i romb',items:['P = a × h (bok × wysokość)','Wysokość ⊥ podstawa!','Romb: 4 równe boki','Romb: P = a × h','lub P = (d₁ × d₂) ÷ 2 (przekątne)']},
    {t:'t5',h:'Trójkąt',items:['P = (a × h) ÷ 2','Podstawa × wysokość ÷ 2','Wysokość ⊥ do podstawy','Każdy bok może być podstawą','h zmienia się przy zmianie podstawy']},
    {t:'t5',h:'Trapez',items:['P = (a + b) × h ÷ 2','a i b = równoległe boki (podstawy)','h = wysokość (odległość między nimi)','(a+b) = suma podstaw','Pamiętaj: dzielisz przez 2!']},
  ],
  formulas:`<strong>Prostokąt:</strong> <span class="math">P = a × b</span><br>

{id:'t7',ico:'➕➖',num:'Rozd. 7',name:'Liczby dodatnie i ujemne',
theory:{
  summary:'Liczby całkowite na osi liczbowej — dodawanie, odejmowanie, mnożenie i dzielenie z liczbami ujemnymi.',
  blocks:[
    {t:'t7',h:'Oś liczbowa',items:['Liczby ujemne: …−3, −2, −1','Zero: 0','Liczby dodatnie: 1, 2, 3…','Im bardziej w lewo → mniejsza','−5 < −2 < 0 < 3 < 7']},
    {t:'t7',h:'Dodawanie i odejmowanie',items:['(+) + (+) = +','(−) + (−) = − (większa wartość)','(+) + (−) = ± (różnica, znak większej)','a − (−b) = a + b','Odejmowanie ujemnej = dodawanie!']},
    {t:'t7',h:'Mnożenie',items:['(+) × (+) = +','(−) × (−) = + ← uwaga!','(+) × (−) = −','(−) × (+) = −','Jednakowe znaki → +, różne → −']},
    {t:'t7',h:'Dzielenie',items:['Zasady jak przy mnożeniu!','(+) ÷ (+) = +','(−) ÷ (−) = +','(+) ÷ (−) = −','(−) ÷ (+) = −']},
  ],
  formulas:`<strong>Znaki przy mnożeniu/dzieleniu:</strong><br>
<span class="math">(+) × (+) = (+)</span> &nbsp; <span class="math">(−) × (−) = (+)</span><br>
<span class="math">(+) × (−) = (−)</span> &nbsp; <span class="math">(−) × (+) = (−)</span><br>
<strong>Odejmowanie ujemnej:</strong> <span class="math">a − (−b) = a + b</span><br>
<strong>Wartość bezwzględna:</strong> <span class="math">|−5| = 5, |7| = 7</span>`,
},
examples:[
  {q:'Oblicz: −3 + (−5)',steps:['Dodajemy dwie ujemne','Wynik jest ujemny','Wartość: 3+5 = 8'],ans:'−8'},
  {q:'Oblicz: 4 − (−7)',steps:['Odejmowanie ujemnej = dodawanie','4 − (−7) = 4 + 7'],ans:'11'},
  {q:'Oblicz: (−6) × (−4)',steps:['Dwa znaki minus → wynik dodatni','(−6) × (−4) = +(6×4)'],ans:'+24'},
],
flashcards:[
  {q:'Ile wynosi (−3) × (−5)?',a:'<strong>+15</strong>. Dwie liczby ujemne mnożone przez siebie dają wynik <strong>dodatni</strong>. Minus × Minus = Plus!'},
  {q:'Ile wynosi 5 − (−8)?',a:'Odejmowanie ujemnej = dodawanie: 5 − (−8) = 5 + 8 = <strong>13</strong>.'},
  {q:'Które jest większe: −7 czy −2?',a:'<strong>−2 > −7</strong>. Na osi liczbowej −2 leży dalej w prawo (bliżej zera). Im mniejsza wartość bezwzględna ujemnej — tym większa liczba.'},
  {q:'Ile wynosi (−12) ÷ (−3)?',a:'Dwa minusy → wynik plus: (−12) ÷ (−3) = <strong>+4</strong>.'},
  {q:'Co to wartość bezwzględna?',a:'<strong>|a|</strong> = odległość od zera na osi liczbowej. Zawsze nieujemna: |−5| = 5, |3| = 3, |0| = 0.'},
],

  {q:'Ile wynosi 3 − (−8)?',opts:['−5','5','11','−11'],a:2,hint:'Odejmowanie ujemnej = dodawanie',expl:'3 − (−8) = 3 + 8 = <strong>11</strong>.'},
  {q:'Ile wynosi (−5) × (−7)?',opts:['−35','35','12','−12'],a:1,hint:'Minus × minus = plus',expl:'(−5) × (−7) = +(5×7) = <strong>35</strong>.'},
  {q:'Które jest największe?',opts:['−10','−1','0','−5'],a:2,hint:'Na osi liczbowej: im dalej w prawo, tym większe',expl:'0 > −1 > −5 > −10. Największe to <strong>0</strong>.'},
  {q:'Ile wynosi (−20) ÷ 4?',opts:['5','−5','80','−80'],a:1,hint:'Minus ÷ plus = minus',expl:'(−20) ÷ 4 = −(20÷4) = <strong>−5</strong>.'},
]},

    {t:'t8',h:'Upraszczanie wyrażeń',items:['Zbieraj wyrazy podobne!','3x + 5x = 8x (te same litery)','2x + 3y ≠ 5xy (różne litery!)','3(x+2) = 3x + 6 (rozwiń)','Zachowaj kolejność działań']},
    {t:'t8',h:'Rozwiązywanie równań',items:['x + 5 = 12 → x = 12 − 5 = 7','2x = 14 → x = 14 ÷ 2 = 7','Sprawdzenie: podstaw x do równania','Przenosimy: zmiana znaku!','x − 3 = 9 → x = 9 + 3 = 12']},
    {t:'t8',h:'Zadania tekstowe → równanie',items:['"większy o 3 od x" → x + 3','Suma = równa się','"dwukrotność x" → 2x','"razy mniejszy" → dzielenie','Zawsze sprawdź odpowiedź!']},
  ],
  formulas:`<strong>Wyrażenie → wartość:</strong> podstaw liczbę za literę<br>
<strong>Upraszczanie:</strong> <span class="math">ax + bx = (a+b)x</span><br>
<strong>Rozwinięcie nawiasu:</strong> <span class="math">a(b+c) = ab + ac</span><br>
<strong>Równanie:</strong> przenoś na drugą stronę ze <strong>zmianą znaku</strong> (+→−, ×→÷)`,
},
examples:[
  {q:'Uprość: 4x + 3y − x + 2y',steps:['Zbierz wyrazy z x: 4x − x = 3x','Zbierz wyrazy z y: 3y + 2y = 5y','Wynik: 3x + 5y'],ans:'3x + 5y'},
  {q:'Rozwiąż: 3x − 4 = 11',steps:['3x = 11 + 4 = 15','x = 15 ÷ 3','x = 5','Sprawdzenie: 3×5−4 = 15−4 = 11 ✓'],ans:'x = 5'},
  {q:'Suma liczby o 2 większej od x i 3x równa 22',steps:['Zapisz równanie: (x+2) + 3x = 22','Uprość: 4x + 2 = 22','4x = 20 → x = 5'],ans:'x = 5'},
],
flashcards:[
  {q:'Co to znaczy "uprościć wyrażenie"?',a:'Zebrać <strong>wyrazy podobne</strong> (z tą samą literą). Np. 5x + 3x = 8x, 2x + 4y − x = x + 4y. Nie można łączyć różnych liter (x ≠ y)!'},
  {q:'Jak rozwiązać równanie 5x + 3 = 18?',a:'1. Przenieś 3: 5x = 18−3 = 15. 2. Podziel: x = 15÷5 = <strong>3</strong>. 3. Sprawdzenie: 5×3+3 = 18 ✓.'},
  {q:'Oblicz wartość 2x² − 3x dla x=4',a:'2×(4²) − 3×4 = 2×16 − 12 = 32 − 12 = <strong>20</strong>. Zawsze podstawiaj w nawiasach!'},
  {q:'Jak zapisać "dwukrotność sumy x i 3"?',a:'<strong>2 × (x + 3)</strong> = 2(x+3). Nawiasy są ważne! Bez nich: 2x+3 ≠ 2(x+3).'},
  {q:'Co to przeniesienie wyrazu na drugą stronę?',a:'Wyraz przenosi się ze <strong>zmianą znaku</strong>: + staje się −, × staje się ÷. Np. x+5=12 → x=12<strong>−</strong>5=7.'},
],
quiz:[
  {q:'Ile wynosi 3x − 2 dla x=5?',opts:['13','8','17','11'],a:0,hint:'Podstaw x=5',expl:'3×5 − 2 = 15 − 2 = <strong>13</strong>.'},
  {q:'Uprość: 6x + 2y − 2x + y',opts:['4x + 3y','8x + 3y','4x + y','8x + y'],a:0,hint:'Zbierz osobno x i y',expl:'6x−2x = 4x; 2y+y = 3y. Wynik: <strong>4x + 3y</strong>.'},
  {q:'Rozwiąż: 4x + 5 = 21',opts:['x=4','x=5','x=6','x=3'],a:0,hint:'4x = 21−5, potem ÷4',expl:'4x = 21−5 = 16. x = 16÷4 = <strong>4</strong>. Sprawdzenie: 4×4+5=21 ✓.'},
  {q:'Rozwinij nawias: 3(2x − 4)',opts:['6x − 4','6x − 12','5x − 7','6x + 12'],a:1,hint:'3 × 2x i 3 × (−4)',expl:'3×2x = 6x; 3×(−4) = −12. Wynik: <strong>6x − 12</strong>.'},
  {q:'"Suma liczby o 5 większej od x i 2x = 23" — ile to x?',opts:['x=4','x=5','x=6','x=7'],a:2,hint:'(x+5) + 2x = 23',expl:'(x+5)+2x=23 → 3x+5=23 → 3x=18 → x=<strong>6</strong>. Sprawdź: (6+5)+12=23 ✓.'},
]},
];

// ══════════════════ STATE
let ct=TOPICS[0],tab='theory',fcI=0,fcF=false,qi=0,sel=null,score=0,mistakes=[],qList=[];

function applyColors(id){
  const c=C[id];
  document.documentElement.style.setProperty('--c',c.c);
  document.documentElement.style.setProperty('--c-bg',c.bg);
  document.documentElement.style.setProperty('--c-d',c.d);
}

function setTopic(id){
  ct=TOPICS.find(t=>t.id===id);
  tab='theory';fcI=0;fcF=false;
  qi=0;sel=null;score=0;mistakes=[];
  qList=[...ct.quiz].sort(()=>Math.random()-.5);
  applyColors(id);
  renderTopics();renderITabs();render();
}

function setTab(id){
  tab=id;fcI=0;fcF=false;
  if(id==='quiz'){qi=0;sel=null;score=0;mistakes=[];qList=[...ct.quiz].sort(()=>Math.random()-.5);}
  renderITabs();render();
}

function renderTopics(){
  document.getElementById('topic-grid').innerHTML=TOPICS.map(t=>`
    <button class="tcard${t.id===ct.id?' active':''}" onclick="setTopic('${t.id}')"
      style="${t.id===ct.id?`border-color:${C[t.id].c};background:${C[t.id].bg}`:''}">
      <div class="tc-ico">${t.ico}</div>
      <div class="tc-body">
        <div class="tc-num">${t.num}</div>
        <div class="tc-name">${t.name}</div>
      </div>
    </button>`).join('');
}

const TABS=[
  {id:'theory',l:'📖 Teoria'},
  {id:'formulas',l:'📋 Wzory'},
  {id:'examples',l:'✏️ Przykłady'},
  {id:'flash',l:'🃏 Fiszki'},
  {id:'quiz',l:'🧮 Test'},
];

function renderITabs(){
  document.getElementById('itabs').innerHTML=TABS.map(t=>`
    <button class="itab${tab===t.id?' active':''}"
      style="${tab===t.id?`background:${C[ct.id].c}`:''}
      " onclick="setTab('${t.id}')">${t.l}</button>`).join('');
}

// RENDERS
function renderTheory(){
  const th=ct.theory;
  return `<div class="card">
    <div class="card-h">${ct.ico} ${ct.name}</div>
    <p style="font-size:14px;color:var(--muted);margin-bottom:14px;line-height:1.6">${th.summary}</p>
    <div class="tgrid">${th.blocks.map(b=>`
      <div class="tbox" style="background:${C[b.t].bg};border-color:${C[b.t].c}40">
        <h3 style="color:${C[b.t].d}">${b.h}</h3>
        <ul style="color:${C[b.t].d}">${b.items.map(i=>`<li>${i}</li>`).join('')}</ul>
      </div>`).join('')}
    </div>
  </div>
  <div style="margin-top:4px"><button class="btn btn-pri" onclick="setTab('formulas')">📋 Wzory →</button></div>`;
}

function renderFormulas(){
  return `<div class="card">
    <div class="card-h">📋 Wzory — ${ct.name}</div>
    <div class="formula">${ct.theory.formulas}</div>
    <div style="margin-top:4px"><button class="btn btn-pri" onclick="setTab('examples')">✏️ Przykłady →</button></div>
  </div>`;
}

function renderExamples(){
  return `<div class="card">
    <div class="card-h">✏️ Przykłady krok po kroku</div>
    <div class="ex-list">${ct.examples.map(e=>`
      <div class="ex-item">
        <div class="ex-q">${e.q}</div>
        <div class="ex-steps">
          ${e.steps.map((s,i)=>`
            <div class="ex-step">
              <div class="ex-step-n" style="background:${C[ct.id].c}">${i+1}</div>
              <div>${s}</div>
            </div>`).join('')}
          <div class="ex-ans">✅ Odpowiedź: ${e.ans}</div>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderFlash(){
  const cards=ct.flashcards;
  const c=cards[fcI];
  return `<div class="card">
    <div class="card-h">🃏 Fiszki — ${ct.name}</div>
    <div class="fc-meta">Kliknij kartę · ${fcI+1} z ${cards.length}</div>
    <div class="flashcard${fcF?' flipped':''}" onclick="flipCard()">
      <div class="fc-inner">
        <div class="fc-front"><div class="fc-q">${c.q}</div><div class="fc-tap">👆 Kliknij, by zobaczyć odpowiedź</div></div>
        <div class="fc-back" style="background:${C[ct.id].bg};border-color:${C[ct.id].c}">
          <div class="fc-a" style="--c-d:${C[ct.id].d}">${c.a}</div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="btn btn-sec" onclick="fcNav(-1)" ${fcI===0?'disabled':''}>← Poprzednia</button>
      <span class="fc-count">${fcI+1} / ${cards.length}</span>
      <button class="btn btn-pri" onclick="fcNav(1)" ${fcI===cards.length-1?'disabled':''}>Następna →</button>
    </div>
  </div>`;
}

function flipCard(){fcF=!fcF;render();}
function fcNav(d){fcI+=d;fcF=false;render();}

function renderQuiz(){
  if(qi>=qList.length)return renderResult();
  const q=qList[qi];
  const total=qList.length;
  const pct=Math.round((qi/total)*100);
  const optsHTML=q.opts.map((o,i)=>{
    let cls='opt';
    if(sel!==null){if(i===q.a)cls+=' ok';else if(i===sel&&sel!==q.a)cls+=' no';}
    return `<button class="${cls}" onclick="choose(${i})" ${sel!==null?'disabled':''}>${o}</button>`;
  }).join('');
  let fb='';
  if(sel!==null){
    fb=sel===q.a
      ?`<div class="feedback ok">✓ Правильно! <div class="expl">${q.expl}</div></div>`
      :`<div class="feedback no">✗ Правильna: <strong>${q.opts[q.a]}</strong><div class="expl">${q.expl}</div></div>`;
  }
  return `
  <div class="prog-bar"><div class="prog-fill" style="background:${C[ct.id].c};width:${pct}%"></div></div>
  <div class="score-row">
    <span>Pytanie <b>${qi+1}/${total}</b></span>
    <span>✅ <b style="color:var(--ok)">${score}</b></span>
    <span>❌ <b style="color:var(--err)">${mistakes.length}</b></span>
  </div>
  <div class="card">
    <div class="q-label">Pytanie ${qi+1}</div>
    <div class="q-text">${q.q}</div>
    <div class="q-hint">💡 ${q.hint}</div>
    <div class="opts">${optsHTML}</div>
    ${fb}
  </div>
  <div class="nav-row">${sel!==null?`<button class="btn btn-pri" onclick="nextQ()">Dalej →</button>`:''}</div>`;
}

function renderResult(){
  const total=qList.length;
  const pct=Math.round((score/total)*100);
  const emoji=pct>=80?'🎉':pct>=60?'👍':'📚';
  const stars=pct>=100?'⭐⭐⭐':pct>=80?'⭐⭐':pct>=60?'⭐':'';
  const msg=pct>=80?'Warwara — gotowa na kontrolną!':pct>=60?'Dobrze! Powtórz błędy.':'Wróć do teorii i wzorów.';
  const mHTML=mistakes.length?`
    <div style="margin-top:16px;text-align:left">
      <div style="font-size:14px;font-weight:800;margin-bottom:10px">Błędy:</div>
      ${mistakes.map(m=>`
        <div class="mk">
          <div class="mk-q">${m.q}</div>
          <div class="mk-w">Ти відповіла: <b>${m.wrong}</b></div>
          <div class="mk-c">✓ ${m.correct}</div>
          <div class="mk-r">${m.rule}</div>
        </div>`).join('')}
    </div>`:'';
  return `<div class="card"><div class="result">
    <div style="font-size:42px">${emoji}</div>
    <div style="font-size:24px;margin:4px 0">${stars}</div>
    <div class="big" style="color:${C[ct.id].c}">${score}/${total}</div>
    <div class="msg">${msg}</div>
    <div class="result-btns">
      <button class="btn btn-sec" onclick="setTab('theory')">📖 Teoria</button>
      <button class="btn btn-sec" onclick="setTab('formulas')">📋 Wzory</button>
      <button class="btn btn-pri" onclick="setTab('quiz')">Ponownie ↺</button>
    </div>
    ${mHTML}
  </div></div>`;
}

function choose(i){
  if(sel!==null)return;
  sel=i;
  const q=qList[qi];
  if(i===q.a)score++;
  else mistakes.push({q:q.q,wrong:q.opts[i],correct:q.opts[q.a],rule:q.expl});
  render();
}
function nextQ(){qi++;sel=null;render();}

function render(){
  const c=document.getElementById('content');
  if(tab==='theory')c.innerHTML=renderTheory();
  else if(tab==='formulas')c.innerHTML=renderFormulas();
  else if(tab==='examples')c.innerHTML=renderExamples();
  else if(tab==='flash')c.innerHTML=renderFlash();
  else c.innerHTML=renderQuiz();
}

setTopic('t1');
</script>
</body>
</html>
